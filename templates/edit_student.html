<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Edit Student</h2>

        <form method="POST">
            <input 
                type="text" 
                name="name" 
                value="{{ student.name }}" 
                placeholder="Student Name" 
                required
            >

            <input 
                type="email" 
                name="email" 
                value="{{ student.email }}" 
                placeholder="Email" 
                required
            >

            <input 
                type="text" 
                name="course" 
                value="{{ student.course }}" 
                placeholder="Course" 
                required
            >

            <button type="submit">Update Student</button>
        </form>

        <br>
        <a href="/dashboard" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
